version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore(deps):"
    groups:
      ml-stack:
        patterns:
          - "torch"
          - "transformer-lens"
          - "sae-lens"
          - "transformers"
      dev-tools:
        patterns:
          - "ruff"
          - "mypy"
          - "pytest*"
          - "hypothesis"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore(actions):"
